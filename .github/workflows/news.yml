name: Refresh news feed

on:
  schedule:
    # Weekly, Mondays 06:00 UTC. GitHub schedules can be delayed/skipped under
    # load; workflow_dispatch lets us trigger manually as a fallback.
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    name: Refresh news, build, deploy
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npx tsx scripts/fetch-news.ts

      # Commit the fresh news.json so we have a git audit trail of what was shown.
      # Best-effort: if the push races with another commit, the deploy still proceeds
      # below with the freshly-fetched file in the working tree.
      - name: Commit refreshed news.json (best-effort)
        continue-on-error: true
        run: |
          git config user.name "news-bot"
          git config user.email "actions@github.com"
          if git diff --quiet -- public/news.json; then
            echo "No news changes."
          else
            git add public/news.json
            git commit -m "chore(news): weekly feed refresh"
            git push
          fi

      # Build + deploy from this workflow, because a commit pushed with the workflow's
      # GITHUB_TOKEN does not trigger other workflows (GitHub Actions safety). Without
      # this, the news.json change would never reach the live site.
      - run: npm run build

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_SWA_TOKEN }}
          action: upload
          app_location: dist
          skip_app_build: true
          skip_api_build: true
